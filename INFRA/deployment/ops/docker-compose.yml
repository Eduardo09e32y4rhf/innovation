version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: innovation_db
    restart: always
    environment:
      POSTGRES_USER: innovation_user
      POSTGRES_PASSWORD: innovation_pass
      POSTGRES_DB: innovation_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U innovation_user -d innovation_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: innovation_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth_service:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    container_name: innovation_auth
    command: uvicorn api.auth_main:app --host 0.0.0.0 --port 8001
    restart: always
    env_file:
      - ../../apps/backend/.env
    environment:
      - DATABASE_URL=postgresql://innovation_user:innovation_pass@postgres:5432/innovation_db
      - REDIS_URL=redis://redis:6379/0
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai_service:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    container_name: innovation_ai_service
    command: uvicorn api.ai_main:app --host 0.0.0.0 --port 8002
    restart: always
    env_file:
      - ../../apps/backend/.env
    environment:
      - DATABASE_URL=postgresql://innovation_user:innovation_pass@postgres:5432/innovation_db
      - REDIS_URL=redis://redis:6379/0
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  core_service:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    container_name: innovation_core_service
    command: uvicorn api.core_main:app --host 0.0.0.0 --port 8003
    restart: always
    env_file:
      - ../../apps/backend/.env
    environment:
      - DATABASE_URL=postgresql://innovation_user:innovation_pass@postgres:5432/innovation_db
      - REDIS_URL=redis://redis:6379/0
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  whatsapp_service:
    build:
      context: ../../apps/whatsapp_service
      dockerfile: Dockerfile
    container_name: innovation_whatsapp
    restart: always
    ports:
      - "8004:8004"
    deploy:
      resources:
        limits:
          memory: 512M

  api_monolith:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    container_name: innovation_api_monolith
    restart: always
    env_file:
      - ../../apps/backend/.env
    environment:
      - DATABASE_URL=postgresql://innovation_user:innovation_pass@postgres:5432/innovation_db
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8005:8000"
    networks:
      default:
        aliases:
          - backend
          - monolith
          - api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
    container_name: innovation_frontend
    restart: always
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - API_URL=http://api_monolith:8000
      - NEXT_PUBLIC_API_URL=https://vps8369.panel.icontainer.net
    depends_on:
      - api_monolith

  gateway:
    image: kong:3.4
    container_name: innovation_gateway
    restart: always
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/usr/local/kong/declarative/kong.yml
    volumes:
      - ../gateway/kong.yml:/usr/local/kong/declarative/kong.yml
    ports:
      - "8000:8000"
      - "8443:8443"
    depends_on:
      - auth_service
      - ai_service
      - core_service
      - whatsapp_service

volumes:
  postgres_data:
