version: '3.8'

services:
  kong:
    image: kong:3.4
    container_name: innovation_gateway
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/usr/local/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
    volumes:
      - ./gateway/kong.yml:/usr/local/kong/declarative/kong.yml
    ports:
      - "8000:8000" # Gateway Proxy
      - "8001:8001" # Admin API
    networks:
      - innovation_net

  auth_service:
    build: ./services/auth
    container_name: auth_service
    environment:
      - DATABASE_URL=postgresql://user:secure_pass@postgres:5432/innovation
      - SECRET_KEY=innovation_v2_premium_dark
    networks:
      - innovation_net
    depends_on:
      postgres:
        condition: service_healthy

  ai_service:
    build: ./services/ai
    container_name: ai_service
    networks:
      - innovation_net

  core_service:
    build: ./services/core
    container_name: core_service
    environment:
      - DATABASE_URL=postgresql://user:secure_pass@postgres:5432/innovation
    networks:
      - innovation_net
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: innovation_frontend
    restart: always
    ports:
      - "80:3000"
    environment:
      - API_URL=http://kong:8000
    depends_on:
      - kong
    networks:
      - innovation_net

  postgres:
    image: postgres:15-alpine
    container_name: innovation_db_v2
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=secure_pass
      - POSTGRES_DB=innovation
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d innovation" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - innovation_net

networks:
  innovation_net:
    driver: bridge

volumes:
  postgres_data_v2:
