version: '3.8'\n\nservices:\n  backend:\n    image: backend_image:latest\n    ports:\n      - '5000:5000'\n    environment:\n      - DATABASE_URL=postgresql://user:password@db/postgres\n      - REDIS_URL=redis://cache:6379\n\n  frontend:\n    image: frontend_image:latest\n    ports:\n      - '3000:3000'\n\n  db:\n    image: postgres:latest\n    environment:\n      - POSTGRES_USER=user\n      - POSTGRES_PASSWORD=password\n    volumes:\n      - pgdata:/var/lib/postgresql/data\n\n  mongodb:\n    image: mongo:latest\n    volumes:\n      - mongo-data:/data/db\n\n  cache:\n    image: redis:latest\n\nvolumes:\n  pgdata:\n  mongo-data: