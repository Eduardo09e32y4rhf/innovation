version: '3.8'

services:
  postgres:
    image: postgres:13
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U user' ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:latest
    restart: always
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ 'CMD-SHELL', 'nc -z mongodb 27017' ]
      interval: 10s

  redis:
    image: redis:latest
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD-SHELL', 'redis-cli ping' ]
      interval: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - mongodb
      - redis
    environment:
      DATABASE_URL: postgres://user:password@postgres/db
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: [ 'CMD-SHELL', 'curl -f http://localhost:8000/health' ]
      interval: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "443:443"
    depends_on:
      - frontend
    healthcheck:
      test: [ 'CMD-SHELL', 'curl -f http://localhost' ]
      interval: 30s

volumes:
  postgres_data:
  mongo_data:
  redis_data: