# docker-compose de PRODUCAO
# Sobe: PostgreSQL + API (NestJS) + Web (Next.js estatico)
# Discovery-first: se 3000/3333 forem do Innovation antigo, pare/recrie e mantenha essas portas.
#
# Na VPS:
#   cp .env.prod.example .env   # preencha com seus valores
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: innovation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5435}:5432"
    volumes:
      - innovation_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
    ports:
      - "127.0.0.1:6432:6432"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: innovation-redis
    restart: unless-stopped
    volumes:
      - innovation_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3333}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}?pgbouncer=true
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-60m}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DEV_EMAIL: ${DEV_EMAIL}
      DEV_PASSWORD: ${DEV_PASSWORD}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PLATFORM_COMPANY_DOCUMENT: ${PLATFORM_COMPANY_DOCUMENT:-00000000000000}
      DEMO_COMPANY_DOCUMENT: ${DEMO_COMPANY_DOCUMENT:-00000000000191}
      WHATSAPP_SESSION_PATH: /data/whatsapp
      WHATSAPPMEDIA_PATH: /data/whatsapp-media
    ports:
      - "127.0.0.1:${API_HOST_PORT:-3333}:${API_PORT:-3333}"
    volumes:
      - innovation_wa:/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-/api}
        NEXT_TELEMETRY_DISABLED: 1
    container_name: innovation-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: ${WEB_PORT:-3000}
    ports:
      - "${WEB_HOST_PORT:-3000}:${WEB_PORT:-3000}"

volumes:
  innovation_pgdata:
  innovation_wa:
  innovation_redisdata:
