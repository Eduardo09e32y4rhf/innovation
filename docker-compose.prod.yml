version: '3.8'

services:
  postgres:
    image: postgres:13
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U user' ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:latest
    restart: always
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ 'CMD', 'mongosh', '--eval', "db.runCommand({ ping: 1 })" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started
    environment:
      # Banco de dados (usa nomes dos serviços Docker internos)
      - DATABASE_URL=postgresql://user:password@postgres:5432/db
      - REDIS_URL=redis://redis:6379/0
      # Segurança
      - SECRET_KEY=${JWT_SECRET_KEY:-innovation_v2_premium_dark}
      # APIs externas
      - GEMINI_API_KEYS=${GEMINI_API_KEYS}
      - MP_ACCESS_TOKEN=${MERCADO_PAGO_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - BASE_URL=http://187.77.49.207
      - PYTHONPATH=/app/src:/app
    env_file:
      - .env.prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://187.77.49.207
      - API_URL=http://backend:8000
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost' ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  mongo_data:
  redis_data:
