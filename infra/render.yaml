services:
  - type: web
    name: innovation-rh-connect-api
    runtime: node
    branch: feat/integracao-frontend
    plan: free
    buildCommand: npm ci && npm run db:generate && npm run build:api
    startCommand: npm run db:deploy && npm run db:seed && npm run start:api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: innovation-rh-connect-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ALLOWED_ORIGINS
        value: https://innovation-rh-connect-web.onrender.com
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: WHATSAPP_SESSION_PATH
        value: /tmp/innovation-rh-connect/whatsapp
      - key: WHATSAPPMEDIA_PATH
        value: /tmp/innovation-rh-connect/whatsapp-media

  - type: web
    name: innovation-rh-connect-web
    runtime: static
    branch: feat/integracao-frontend
    plan: free
    buildCommand: npm ci && npm run build:web
    staticPublishPath: apps/web/out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://innovation-rh-connect-api.onrender.com
      - key: NEXT_PUBLIC_APP_URL
        value: https://innovation-rh-connect-web.onrender.com
      - key: NEXT_PUBLIC_ENABLE_LOCAL_SESSION
        value: "false"

databases:
  - name: innovation-rh-connect-db
    plan: free
    databaseName: innovation_rh_connect
    user: innovation_rh_user
