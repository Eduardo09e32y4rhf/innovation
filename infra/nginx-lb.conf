user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
}

http {
  client_max_body_size 50M;

  upstream api_upstream {
    server api:3333 max_fails=3 fail_timeout=30s;
  }

  upstream web_upstream {
    server web:3000 max_fails=3 fail_timeout=30s;
  }

  # Redireciona tudo do HTTP para o HTTPS
  server {
    listen 80;
    server_name vps8369.panel.icontainer.net;
    return 301 https://$host$request_uri;
  }

  # Servidor Principal HTTPS
  server {
    listen 443 ssl;
    server_name vps8369.panel.icontainer.net;

    ssl_certificate /etc/letsencrypt/live/vps8369.panel.icontainer.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vps8369.panel.icontainer.net/privkey.pem;
    
    # Rota para a API NestJS
    location /api/ {
      rewrite ^/api/(.*) /$1 break;
      proxy_pass http://api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rota principal para o Frontend Next.js
    location / {
      proxy_pass http://web_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
