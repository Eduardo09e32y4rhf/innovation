_format_version: "3.0"

services:
  - name: auth-service
    url: http://auth_service:8001
    routes:
      - name: auth-routes
        paths:
          - /api/auth
        strip_path: true
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - OPTIONS
            - PUT
            - PATCH
            - DELETE
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - Authorization
          exposed_headers:
            - Content-Type
            - Authorization
          max_age: 3600
          credentials: true

  - name: ai-service
    url: http://ai_service:8002
    routes:
      - name: ai-routes
        paths:
          - /api/ai
        strip_path: true

  - name: core-service
    url: http://core_service:8003
    routes:
      - name: core-routes
        paths:
          - /api/jobs
          - /api/finance
          - /api/dashboard
          - /api/rh
        strip_path: false
