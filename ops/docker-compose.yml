services:
  auth_service:
    build:
      context: ../services/auth
      dockerfile: Dockerfile
    container_name: innovation_auth
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user_N7khBY}:${POSTGRES_PASSWORD:-password_Zs6bid}@${POSTGRES_HOST:-172.17.0.1}:5432/${POSTGRES_DB:-innovation_db}
      - SECRET_KEY=${SECRET_KEY}

  ai_service:
    build:
      context: ../services/ai
      dockerfile: Dockerfile
    container_name: innovation_ai_service
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    environment:
      - GEMINI_API_KEYS=${GEMINI_API_KEYS}
      - REDIS_URL=redis://:redis_pTEpH8@${REDIS_HOST:-172.17.0.1}:6379/0
      - HOST_IP=172.17.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"

  core_service:
    build:
      context: ../services/core
      dockerfile: Dockerfile
    container_name: innovation_core_service
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user_N7khBY}:${POSTGRES_PASSWORD:-password_Zs6bid}@${POSTGRES_HOST:-172.17.0.1}:5432/${POSTGRES_DB:-innovation_db}

  api_monolith:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: innovation_api_monolith
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user_N7khBY}:${POSTGRES_PASSWORD:-password_Zs6bid}@${POSTGRES_HOST:-172.17.0.1}:5432/${POSTGRES_DB:-innovation_db}
      - REDIS_URL=redis://:redis_pTEpH8@${REDIS_HOST:-172.17.0.1}:6379/0
      - GEMINI_API_KEYS=${GEMINI_API_KEYS}
      - SECRET_KEY=${SECRET_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8005:8000"

  ai_worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: innovation_worker
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    command: celery -A ai_engine.worker worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user_N7khBY}:${POSTGRES_PASSWORD:-password_Zs6bid}@${POSTGRES_HOST:-172.17.0.1}:5432/${POSTGRES_DB:-innovation_db}
      - REDIS_URL=redis://:redis_pTEpH8@${REDIS_HOST:-172.17.0.1}:6379/0
      - GEMINI_API_KEYS=${GEMINI_API_KEYS}
      - PYTHONPATH=/app/backend/src:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: innovation_frontend
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 1G
    environment:
      - API_URL=http://gateway:8000
    ports:
      - "3000:3000"
    depends_on:
      - gateway

  gateway:
    image: kong:3.4
    container_name: innovation_gateway
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/usr/local/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001, 0.0.0.0:8444 ssl
    volumes:
      - ../gateway/kong.yml:/usr/local/kong/declarative/kong.yml
    ports:
      - "8000:8000"
      - "8443:8443"
    depends_on:
      - auth_service
      - ai_service
      - core_service
