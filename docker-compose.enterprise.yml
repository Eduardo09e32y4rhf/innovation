version: '3.8'
services:
  # 🎮 METABASE - MOTOR DE GAMIFICAÇÃO E DASHBOARDS
  metabase:
    image: metabase/metabase:latest
    container_name: innovation_metabase
    restart: unless-stopped
    ports:
      - "3030:3000" # Exposto na porta 3030 para não conflitar com o Next.js
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=innovation_db
      - MB_DB_PORT=5432
      - MB_DB_USER=innovation
      - MB_DB_PASS=secure_pass
      - MB_DB_HOST=innovation_db_v2 # Conecta ao banco principal
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 2G # Proteção contra Out-Of-Memory na VPS

  # 🧠 FLOWISE - MOTOR DE IA
  flowise:
    image: flowiseai/flowise:latest
    container_name: innovation_flowise
    restart: unless-stopped
    ports:
      - "3001:3000" # Exposto na porta 3001 (host) -> 3000 (container)
    environment:
      - PORT=3000
      - DATABASE_PATH=/root/.flowise
      - APIKEY_PATH=/root/.flowise
      - SECRET_KEY=secure_flowise_secret
      - LOG_LEVEL=info
    volumes:
      - flowise_data:/root/.flowise
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 1G

networks:
  app-network:
    external: true

volumes:
  flowise_data:
