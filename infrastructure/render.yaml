services:
  - type: web
    name: innovation-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && gunicorn src.api.main:app -w 4 -k uvicorn.workers.UvicornWorker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: innovation-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: innovation-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PYTHONPATH
        value: "src"
      - key: GEMINI_API_KEYS
        sync: false

  - type: web
    name: innovation-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: innovation-backend
          property: url
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: innovation-backend
          property: url
      - key: NODE_ENV
        value: production

  - type: redis
    name: innovation-redis
    region: oregon
    plan: free
    ipAllowList: []

databases:
  - name: innovation-db
    databaseName: innovation
    user: innovation
    region: oregon
    plan: free
