name: Innovation RH Connect CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'

jobs:
  validate:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: innovation_rh_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: innovation_rh_connect_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Validate Workspace Foundation
      run: npm run check:workspace

    - name: Prisma Validate
      run: npm run prisma:validate

    - name: Prisma Generate
      run: npm run prisma:generate

    - name: Lint Web (Next.js)
      run: npm run lint:web

    - name: Typecheck API
      run: npm run typecheck:api

    - name: Typecheck Web
      run: npm run typecheck:web

    - name: Test API
      env:
        DATABASE_URL: postgresql://innovation_rh_user:test_password@localhost:5432/innovation_rh_connect_test
        JWT_SECRET: test_jwt_secret_key_12345
        REDIS_URL: redis://localhost:6379
      run: npm run test:api

    - name: Build Web
      run: npm run build:web

    - name: Build API
      run: npm run build:api
